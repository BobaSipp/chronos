name: Publish to GitHub Packages

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Build gem
        run: gem build chronos.gemspec

      - name: Publish to GitHub Packages
        run: |
          ruby -e '
            require "fileutils"
            dir = File.expand_path("~/.gem")
            FileUtils.mkdir_p(dir)
            path = File.join(dir, "credentials")
            File.write(path, "---\n:github: Bearer #{ARGV[0]}\n")
            File.chmod(0600, path)
          ' "${{ secrets.GITHUB_TOKEN }}"
          gem push --key github --host https://rubygems.pkg.github.com/${{ github.repository_owner }} chronos-*.gem
