name: Publish to GitHub Packages

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Build gem
        run: gem build chronos.gemspec

      - name: Publish to GitHub Packages
        run: |
          mkdir -p ~/.gem
          cat > ~/.gem/credentials << EOF
---
:github: Bearer ${{ secrets.GITHUB_TOKEN }}
EOF
          chmod 0600 ~/.gem/credentials
          gem push --key github --host https://rubygems.pkg.github.com/${{ github.repository_owner }} chronos-*.gem
